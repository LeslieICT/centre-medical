<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Centre Médical - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 380px;
            text-align: center;
        }
        .login-box h1 {
            color: #1B6CA8;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1B6CA8;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #1B6CA8;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover { background-color: #154f7a; }
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🏥 Centre Médical</h1>
        <p>Connectez-vous pour accéder au système</p>

        <!-- Message d'erreur -->
        <div class="error" id="erreur"></div>

        <form action="/centre-medical/login" method="post">
            <div class="form-group">
                <label>Login</label>
                <input type="text" name="login" placeholder="Votre login" required />
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="Votre mot de passe" required />
            </div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
    </div>
</body>
</html>
